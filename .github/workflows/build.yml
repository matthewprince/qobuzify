name: Build desktop apps

# Builds the Qobuzify desktop wrapper for Linux, macOS, and Windows.
# - workflow_dispatch: validation build, uploads artifacts only (no release).
# - push tag v*:       full build, publishes a GitHub Release with all installers.
#
# All three runners are free with no minute cap because this repo is public. If a
# faster macOS build is ever wanted, swap the macos-14 runner below for a WarpBuild
# label (e.g. warp-macos-latest-arm64); nothing else changes.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: "--linux"
          - os: windows-latest
            args: "--win"
          - os: macos-14
            args: "--mac --universal"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrapper dependencies
        working-directory: wrapper
        run: npm ci

      - name: Bake Qobuzify payload
        working-directory: wrapper
        run: npm run prebuild

      # Bundle a portable mpv into the Linux build so the AppImage is self-contained (deb keeps pactl as a
      # dep; mpv is bundled for both). The wrapper spawns mpv as a subprocess for bit-perfect output, so a
      # process-boundary bundle is mere aggregation - unmodified upstream mpv, GPL honored, no libmpv link.
      # anylinux == portable across distros. Extracted tree lands at wrapper/resources/mpv (extraResources).
      - name: Bundle mpv (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: wrapper
        run: |
          set -euo pipefail
          URL=$(curl -sL https://api.github.com/repos/pkgforge-dev/mpv-AppImage/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*anylinux-x86_64\.AppImage"' \
            | head -1 | sed -E 's/.*"(https[^"]+)"/\1/')
          echo "mpv AppImage: $URL"
          test -n "$URL"
          curl -sL -o mpv.AppImage "$URL"
          chmod +x mpv.AppImage
          ./mpv.AppImage --appimage-extract >/dev/null
          rm -rf resources/mpv && mkdir -p resources
          # extract yields squashfs-root (a real dir or a symlink to AppDir); -L follows either.
          cp -aL squashfs-root resources/mpv
          chmod +x resources/mpv/AppRun || true
          [ -x resources/mpv/bin/mpv ] || chmod +x resources/mpv/bin/mpv || true
          test -x resources/mpv/AppRun
          resources/mpv/AppRun --version | head -1
          rm -rf mpv.AppImage squashfs-root

      - name: Build installers
        working-directory: wrapper
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx --no-install electron-builder ${{ matrix.args }} -p never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qobuzify-${{ matrix.os }}
          if-no-files-found: error
          path: |
            wrapper/dist/*.AppImage
            wrapper/dist/*.deb
            wrapper/dist/*.exe
            wrapper/dist/*.dmg
            wrapper/dist/*.zip

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILES=$(find artifacts -type f | sort)
          echo "Releasing $TAG with:"; echo "$FILES"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Qobuzify $TAG" \
            --notes "Desktop builds of Qobuzify for Linux, macOS, and Windows. These are unsigned: on macOS, right-click the app and choose Open the first time; on Windows, click More info then Run anyway." \
            $FILES
