<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<title>Report a bug - Qobuzify</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    background:
      radial-gradient(620px 420px at 88% -8%, rgba(61,168,254,.16), transparent 60%),
      radial-gradient(520px 420px at -6% 108%, rgba(129,140,248,.12), transparent 60%),
      #060a12;
    color: #f0f6fc; font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 520px; padding: 32px 30px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,.5); backdrop-filter: blur(12px);
  }
  .brand { height: 30px; width: auto; display: block; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin: 18px 0 8px; }
  p.lead { color: #9fb0c6; font-size: 14.5px; line-height: 1.55; margin-bottom: 6px; }
  label { display: block; font-size: 12.5px; font-weight: 650; color: #c6cfda; margin: 15px 0 6px; }
  input, textarea, select {
    width: 100%; font: inherit; font-size: 14px; color: #f0f6fc; background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 10px 12px; outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: rgba(61,168,254,.6); }
  textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
  select { appearance: none; cursor: pointer; }
  .diag {
    margin: 14px 0 2px; font-size: 11.5px; color: #8b98ad; background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 10px 12px;
    font-family: ui-monospace, Consolas, monospace; white-space: pre-wrap; word-break: break-word;
  }
  .diag-note { font-size: 11.5px; color: #6f7b8d; margin-top: 6px; }
  .cf-turnstile { margin: 18px 0 2px; }
  #btn {
    width: 100%; margin-top: 16px; appearance: none; border: 0; border-radius: 11px; padding: 13px;
    font: inherit; font-size: 15px; font-weight: 750; cursor: pointer; color: #06090a; background: #3da8fe;
    transition: filter .12s, opacity .12s;
  }
  #btn:hover:not(:disabled) { filter: brightness(1.07); }
  #btn:disabled { opacity: .45; cursor: not-allowed; }
  .msg { margin-top: 14px; font-size: 13.5px; line-height: 1.5; min-height: 18px; }
  .msg.ok { color: #4ade80; }
  .msg.err { color: #f87171; }
  a { color: #3da8fe; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .foot { margin-top: 20px; font-size: 12.5px; color: #5f6b7e; }
</style>
</head>
<body>
  <div class="card">
    <img class="brand" src="/qobuzify-wordmark.svg" alt="Qobuzify" />
    <h1>Report a bug</h1>
    <p class="lead">Found something broken or missing? Tell us what happened. The more specific, the faster it gets fixed.</p>

    <form id="form" autocomplete="off">
      <label for="type">Type</label>
      <select id="type">
        <option value="bug">Bug (something is broken)</option>
        <option value="feature">Feature request</option>
        <option value="question">Question</option>
      </select>

      <label for="title">Summary</label>
      <input id="title" maxlength="200" placeholder="One line: what's wrong?" />

      <label for="body">Details</label>
      <textarea id="body" maxlength="8000" placeholder="What did you do, what happened, and what did you expect? Steps to reproduce help a lot."></textarea>

      <div id="diagWrap" style="display:none">
        <label>Diagnostics (sent with your report)</label>
        <div class="diag" id="diag"></div>
        <div class="diag-note">Version, platform, active theme, and enabled extensions only. No account or personal data.</div>
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAADvjsQ0A87l19nvH" data-callback="onSolved" data-expired-callback="onExpired" data-theme="dark"></div>
      <button id="btn" type="submit" disabled>Send report</button>
      <div id="msg" class="msg"></div>
    </form>

    <p class="foot">Back to <a href="/">qobuzify.app</a> &middot; Have a theme or extension to share? <a href="/submit">Submit it</a>.</p>
  </div>

  <script>
    var API = "https://api.qobuzify.app";
    var token = null;
    var btn = document.getElementById("btn");
    function q(k) { try { return new URLSearchParams(location.search).get(k) || ""; } catch (e) { return ""; } }
    function msg(t, c) { var m = document.getElementById("msg"); m.textContent = t; m.className = "msg " + (c || ""); }

    // diagnostics passed from the client via the querystring
    var diag = { v: q("v"), ua: q("ua"), theme: q("theme"), exts: q("exts") };
    if (diag.v || diag.ua) {
      document.getElementById("diagWrap").style.display = "block";
      var lines = [];
      if (diag.v) lines.push("version: " + diag.v);
      if (diag.theme) lines.push("theme:   " + diag.theme);
      if (diag.exts) lines.push("exts:    " + diag.exts);
      if (diag.ua) lines.push("client:  " + diag.ua);
      document.getElementById("diag").textContent = lines.join("\n");
    }

    window.onSolved = function (t) { token = t; btn.disabled = false; };
    window.onExpired = function () { token = null; btn.disabled = true; };

    document.getElementById("form").addEventListener("submit", function (e) {
      e.preventDefault();
      if (!token) { msg("Please complete the human check.", "err"); return; }
      var title = document.getElementById("title").value.trim();
      var body = document.getElementById("body").value.trim();
      if (!title && !body) { msg("Please add a summary or details.", "err"); return; }
      btn.disabled = true; msg("Sending...", "");
      fetch(API + "/v1/report", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: token, title: title, body: body, meta: { type: document.getElementById("type").value, v: diag.v, ua: diag.ua, theme: diag.theme, exts: diag.exts } })
      })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (j && j.ok) {
            msg("Thanks. Your report was received (#" + j.id + ").", "ok");
            document.getElementById("form").reset();
          } else {
            msg("Could not send: " + ((j && j.error) || "unknown") + ".", "err");
            btn.disabled = false; try { turnstile.reset(); } catch (e) {} token = null;
          }
        })
        .catch(function () { msg("Network error, please try again.", "err"); btn.disabled = false; });
    });
  </script>
</body>
</html>
